<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLNCE Login</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f0f4f8;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .login-box{
        background:white;
        width:350px;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
        text-align:center;
    }

    .login-box img{
        width:140px;
        height:140px;
        margin-bottom:15px;
    }

    h2{
        margin-bottom:20px;
        color:#003366;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:15px;
        background:#003366;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#0055aa;
    }
</style>

</head>
<body>

<div class="login-box">

    <img src="kln.png" alt="KLNCE Logo">

    <h2>Login</h2>

    <form>
        <input type="text" placeholder="Enter Username" required>

        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Submit</button>
    </form>

</div>

</body>
</html>
